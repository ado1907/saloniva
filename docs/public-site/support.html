<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Saloniva Destek</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; background: #f7f1e8; color: #172018; }
      main { max-width: 860px; margin: 0 auto; padding: 48px 20px; }
      .card { background: #fffaf2; border: 1px solid #e0d3c2; border-radius: 14px; padding: 28px; box-shadow: 0 18px 50px rgba(45, 36, 25, 0.1); }
      h1 { margin-top: 0; font-size: 34px; }
      p, li { line-height: 1.7; color: #4d4134; }
      a, .button { color: #365f43; font-weight: 700; }
      .button { display: inline-block; margin-top: 14px; padding: 12px 16px; border: 1px solid #365f43; border-radius: 10px; text-decoration: none; }
      .brand { font-weight: 800; color: #365f43; letter-spacing: 0.04em; text-transform: uppercase; }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <p class="brand">Saloniva</p>
        <h1>Destek Merkezi</h1>
        <p>Saloniva kurulum, hesap, randevu, odeme ve veri islemleri icin destek kanali.</p>
        <ul>
          <li>E-posta: <a href="mailto:destek@saloniva.app">destek@saloniva.app</a></li>
          <li>Yanit suresi: pilot musteri icin 1 is gunu</li>
          <li>Gerekli bilgiler: salon adi, kullanici e-postasi, ekran goruntusu ve sorunun kisa ozeti</li>
        </ul>
        <a class="button" href="mailto:destek@saloniva.app?subject=Saloniva%20Destek%20Talebi">Destek Talebi Olustur</a>
      </div>
    </main>
  </body>
</html>
